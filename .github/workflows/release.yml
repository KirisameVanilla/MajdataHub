name: Release

on:
  push:
    paths:
      - "src-tauri/tauri.conf.json"
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Majdata Hub v__VERSION__
          releaseDraft: false
          prerelease: false
          args: ""

      - name: Copy artifacts to temp folder
        if: steps.tauri-build.outcome == 'success'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "temp"

          $artifactPaths = '${{ steps.tauri-build.outputs.artifactPaths }}' | ConvertFrom-Json

          foreach ($path in $artifactPaths) {
            if (Test-Path $path) {
              $fileName = Split-Path $path -Leaf
              $fileName = $fileName -replace ' ', '.'
              Copy-Item -Path $path -Destination "temp/$fileName" -Force
              Write-Host "Copied: $fileName"
            } else {
              Write-Warning "File not found: $path"
            }
          }

          Write-Host "All artifacts copied to temp folder"

      - name: Generate latest.json
        if: steps.tauri-build.outcome == 'success'
        shell: pwsh
        env:
          MIRROR_URL: ${{ vars.CNB_URL }}
        run: |
          $pubDate = (Get-Date).ToUniversalTime().ToString("o")

          $platforms = @{}

          $files = Get-ChildItem "temp" -File | Where-Object { $_.Extension -ne ".sig" }

          foreach ($file in $files) {
            $sigPath = Join-Path "temp" "$($file.Name).sig"
            $signature = ""
            
            if (Test-Path $sigPath) {
              $signature = Get-Content $sigPath -Raw
            }
            
            $platformKey = ""
            if ($file.Name -like "*x64_en-US*msi") {
              $platformKey = "windows-x86_64-msi"
            } elseif ($file.Name -like "*x64_en-US*") {
              $platformKey = "windows-x86_64"
            } elseif ($file.Name -like "*x64*setup*") {
              $platformKey = "windows-x86_64-nsis"
            } else {
              continue
            }
            
            $cnbUrl = "$($env:MIRROR_URL)/-/git/raw/main/$($file.Name)?download=true"
            
            $platforms[$platformKey] = @{
              signature = $signature
              url = $cnbUrl
            }
          }

          $latestJson = @{
            version = '${{ steps.tauri-build.outputs.appVersion }}'
            notes = ""
            pub_date = $pubDate
            platforms = $platforms
          } | ConvertTo-Json -Depth 10

          # 写入latest.json到temp目录
          Set-Content -Path "temp/latest.json" -Value $latestJson
          Write-Host "Generated latest.json in temp folder"

      - name: Commit files in temp folder
        if: steps.tauri-build.outcome == 'success'
        shell: bash
        env:
          MIRROR_URL: ${{ vars.CNB_URL }}
          MIRROR_TOKEN: ${{ vars.CNB_TOKEN }}
        run: |
          cd temp
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "hentai lolicon"
          AUTH_URL=$(echo "$MIRROR_URL" | sed -E "s#https://#https://x-access-token:${MIRROR_TOKEN}@#")
          git remote remove mirror 2>/dev/null || true
          git remote add mirror "$AUTH_URL"
          git push mirror --all --force
